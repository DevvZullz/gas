<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Council Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-section">
                <span class="material-symbols-rounded logo-icon">shield_person</span>
                <h2>OSIS Admin</h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <span class="material-symbols-rounded">dashboard</span> Dashboard
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="header-title">
                    <h1>Dashboard Overview</h1>
                    <p>Manage student council members, departments, and statuses.</p>
                </div>
            </header>

            <!-- Stats Cards -->
            <section class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon total-icon">
                        <span class="material-symbols-rounded">groups</span>
                    </div>
                    <div class="stat-info">
                        <h3>Total Members</h3>
                        <p id="total-count">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon active-icon">
                        <span class="material-symbols-rounded">verified</span>
                    </div>
                    <div class="stat-info">
                        <h3>Active</h3>
                        <p id="active-count">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon dept-icon">
                        <span class="material-symbols-rounded">account_tree</span>
                    </div>
                    <div class="stat-info">
                        <h3>Departments</h3>
                        <p id="dept-count">0</p>
                    </div>
                </div>
            </section>

            <!-- Data Content Section -->
            <div class="content-grid">
                <!-- Registration Form -->
                <div class="card form-card">
                    <h2>Add New Member</h2>
                    <form id="member-form">
                        <div class="form-group">
                            <label for="student-name">Full Name</label>
                            <input type="text" id="student-name" placeholder="e.g., Andi Wijaya" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="student-nis">Student ID (NIS)</label>
                            <input type="text" id="student-nis" placeholder="e.g., 12345" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="student-class">Class / Department</label>
                                <input type="text" id="student-class" placeholder="e.g., XI DKV 1" required>
                            </div>
                            <div class="form-group">
                                <label for="student-role">Council Role</label>
                                <select id="student-role" required>
                                    <option value="Chairperson">Chairperson</option>
                                    <option value="Secretary">Secretary</option>
                                    <option value="Treasurer">Treasurer</option>
                                    <option value="Department Head">Department Head</option>
                                    <option value="Member">Member</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="student-dept">Assigned Department</label>
                            <select id="student-dept" required>
                                <option value="Core Management">Core Management (BPH)</option>
                                <option value="Public Relations">Public Relations (Humas)</option>
                                <option value="Sports & Arts">Sports & Arts</option>
                                <option value="Technology & Media">Technology & Media (DKV/IT)</option>
                                <option value="Religious Affairs">Religious Affairs</option>
                            </select>
                        </div>

                        <button type="submit" class="btn-primary">
                            <span class="material-symbols-rounded">person_add</span> Save Member
                        </button>
                    </form>
                </div>

                <!-- Members Table -->
                <div class="card table-card">
                    <div class="table-header">
                        <h2>Council Roster</h2>
                        <div class="search-box">
                            <span class="material-symbols-rounded">search</span>
                            <input type="text" id="search-input" placeholder="Search members...">
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Member</th>
                                    <th>Class</th>
                                    <th>Role</th>
                                    <th>Department</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="members-table-body">
                                <!-- Dynamic Rows Go Here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
                  </html>
